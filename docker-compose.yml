version: "3.8"

# Configuración optimizada para Coolify v4.0.0-beta.462
# Notas importantes:
# - Coolify v4 maneja automáticamente las redes y proxies
# - Usa SERVICE_FQDN_* para URLs automáticas
# - Las variables de entorno se inyectan automáticamente

services:
  # Kong API Gateway
  kong:
    image: kong:2.8.1
    entrypoint: bash -c 'eval "echo \"$$$(cat /home/kong/template.yml)\"" > /home/kong/kong.yml && kong start -v'
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth,rate-limiting
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-supabase}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-supabase}
    volumes:
      - ./volumes/kong/kong-template.yml:/home/kong/template.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "coolify.managed=true"
      - "traefik.enable=true"
      - "traefik.http.routers.kong.rule=Host(`${KONG_HOST}`)"
      - "traefik.http.routers.kong.entrypoints=https"
      - "traefik.http.routers.kong.tls=true"
      - "traefik.http.routers.kong.tls.certresolver=letsencrypt"
      - "traefik.http.services.kong.loadbalancer.server.port=8000"
      - "coolify.healthcheck.enabled=true"
      - "coolify.healthcheck.path=/health"
    depends_on:
      - db
      - analytics
    networks:
      - supabase-network

  # Supabase Studio (Dashboard)
  studio:
    image: supabase/studio:20240701-05dfbec
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION:-Default Organization}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT:-Default Project}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SECRET_ANON_KEY: ${ANON_KEY}
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      AUTH_JWT_JWKS: |
        {
          "keys": [
            {
              "kty": "oct",
              "kid": "${JWT_SECRET}",
              "k": "${JWT_SECRET}",
              "alg": "HS256"
            }
          ]
        }
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "coolify.managed=true"
      - "traefik.enable=true"
      - "traefik.http.routers.studio.rule=Host(`${STUDIO_HOST}`)"
      - "traefik.http.routers.studio.entrypoints=https"
      - "traefik.http.routers.studio.tls=true"
      - "traefik.http.routers.studio.tls.certresolver=letsencrypt"
      - "traefik.http.services.studio.loadbalancer.server.port=3000"
      - "coolify.healthcheck.enabled=true"
      - "coolify.healthcheck.path=/api/health"
    depends_on:
      - db
      - meta
      - analytics
    networks:
      - supabase-network

  # Auth (GoTrue)
  auth:
    image: supabase/gotrue:v2.158.1
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-3600}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM:-false}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-}
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-Supabase Auth}
      GOTRUE_MAILER_SUBJECTS_CONFIRMATION: ${MAILER_SUBJECTS_CONFIRMATION:-Confirm Your Signup}
      GOTRUE_MAILER_SUBJECTS_INVITE: ${MAILER_SUBJECTS_INVITE:-You have been invited}
      GOTRUE_MAILER_SUBJECTS_RECOVERY: ${MAILER_SUBJECTS_RECOVERY:-Reset Your Password}
      GOTRUE_MAILER_SUBJECTS_EMAIL_CHANGE: ${MAILER_SUBJECTS_EMAIL_CHANGE:-Confirm Email Change}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP:-true}
      GOTRUE_EXTERNAL_PHONE_ENABLED: ${ENABLE_PHONE_SIGNUP:-false}
      GOTRUE_EXTERNAL_PHONE_AUTOCONFIRM: ${ENABLE_PHONE_AUTOCONFIRM:-false}
      GOTRUE_SMS_AUTOCONFIRM: ${ENABLE_PHONE_AUTOCONFIRM:-false}
      GOTRUE_SMS_MAX_FREQUENCY: 5s
      GOTRUE_SMS_OTP_EXP: 6000
      GOTRUE_SMS_OTP_LENGTH: 6
      GOTRUE_SMS_PROVIDER: ${SMS_PROVIDER:-}
      GOTRUE_SMS_TWILIO_ACCOUNT_SID: ${SMS_TWILIO_ACCOUNT_SID:-}
      GOTRUE_SMS_TWILIO_AUTH_TOKEN: ${SMS_TWILIO_AUTH_TOKEN:-}
      GOTRUE_SMS_TWILIO_MESSAGE_SERVICE_SID: ${SMS_TWILIO_MESSAGE_SERVICE_SID:-}
      GOTRUE_SMS_TWILIO_CONTENT_SID: ${SMS_TWILIO_CONTENT_SID:-}
      GOTRUE_SMS_MESSAGEBIRD_ACCESS_KEY: ${SMS_MESSAGEBIRD_ACCESS_KEY:-}
      GOTRUE_SMS_MESSAGEBIRD_ORIGINATOR: ${SMS_MESSAGEBIRD_ORIGINATOR:-}
      GOTRUE_SMS_TEXTLOCAL_API_KEY: ${SMS_TEXTLOCAL_API_KEY:-}
      GOTRUE_SMS_TEXTLOCAL_SENDER: ${SMS_TEXTLOCAL_SENDER:-}
      GOTRUE_SMS_VONAGE_API_KEY: ${SMS_VONAGE_API_KEY:-}
      GOTRUE_SMS_VONAGE_API_SECRET: ${SMS_VONAGE_API_SECRET:-}
      GOTRUE_SMS_VONAGE_FROM: ${SMS_VONAGE_FROM:-}
      GOTRUE_EXTERNAL_APPLE_ENABLED: ${EXTERNAL_APPLE_ENABLED:-false}
      GOTRUE_EXTERNAL_APPLE_CLIENT_ID: ${EXTERNAL_APPLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_APPLE_SECRET: ${EXTERNAL_APPLE_SECRET:-}
      GOTRUE_EXTERNAL_APPLE_REDIRECT_URI: ${EXTERNAL_APPLE_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_AZURE_ENABLED: ${EXTERNAL_AZURE_ENABLED:-false}
      GOTRUE_EXTERNAL_AZURE_CLIENT_ID: ${EXTERNAL_AZURE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_AZURE_SECRET: ${EXTERNAL_AZURE_SECRET:-}
      GOTRUE_EXTERNAL_AZURE_REDIRECT_URI: ${EXTERNAL_AZURE_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_BITBUCKET_ENABLED: ${EXTERNAL_BITBUCKET_ENABLED:-false}
      GOTRUE_EXTERNAL_BITBUCKET_CLIENT_ID: ${EXTERNAL_BITBUCKET_CLIENT_ID:-}
      GOTRUE_EXTERNAL_BITBUCKET_SECRET: ${EXTERNAL_BITBUCKET_SECRET:-}
      GOTRUE_EXTERNAL_BITBUCKET_REDIRECT_URI: ${EXTERNAL_BITBUCKET_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_DISCORD_ENABLED: ${EXTERNAL_DISCORD_ENABLED:-false}
      GOTRUE_EXTERNAL_DISCORD_CLIENT_ID: ${EXTERNAL_DISCORD_CLIENT_ID:-}
      GOTRUE_EXTERNAL_DISCORD_SECRET: ${EXTERNAL_DISCORD_SECRET:-}
      GOTRUE_EXTERNAL_DISCORD_REDIRECT_URI: ${EXTERNAL_DISCORD_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_FACEBOOK_ENABLED: ${EXTERNAL_FACEBOOK_ENABLED:-false}
      GOTRUE_EXTERNAL_FACEBOOK_CLIENT_ID: ${EXTERNAL_FACEBOOK_CLIENT_ID:-}
      GOTRUE_EXTERNAL_FACEBOOK_SECRET: ${EXTERNAL_FACEBOOK_SECRET:-}
      GOTRUE_EXTERNAL_FACEBOOK_REDIRECT_URI: ${EXTERNAL_FACEBOOK_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_FIGMA_ENABLED: ${EXTERNAL_FIGMA_ENABLED:-false}
      GOTRUE_EXTERNAL_FIGMA_CLIENT_ID: ${EXTERNAL_FIGMA_CLIENT_ID:-}
      GOTRUE_EXTERNAL_FIGMA_SECRET: ${EXTERNAL_FIGMA_SECRET:-}
      GOTRUE_EXTERNAL_FIGMA_REDIRECT_URI: ${EXTERNAL_FIGMA_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_GITHUB_ENABLED: ${EXTERNAL_GITHUB_ENABLED:-false}
      GOTRUE_EXTERNAL_GITHUB_CLIENT_ID: ${EXTERNAL_GITHUB_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GITHUB_SECRET: ${EXTERNAL_GITHUB_SECRET:-}
      GOTRUE_EXTERNAL_GITHUB_REDIRECT_URI: ${EXTERNAL_GITHUB_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_GITLAB_ENABLED: ${EXTERNAL_GITLAB_ENABLED:-false}
      GOTRUE_EXTERNAL_GITLAB_CLIENT_ID: ${EXTERNAL_GITLAB_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GITLAB_SECRET: ${EXTERNAL_GITLAB_SECRET:-}
      GOTRUE_EXTERNAL_GITLAB_REDIRECT_URI: ${EXTERNAL_GITLAB_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${EXTERNAL_GOOGLE_ENABLED:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${EXTERNAL_GOOGLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${EXTERNAL_GOOGLE_SECRET:-}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${EXTERNAL_GOOGLE_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_KAKAO_ENABLED: ${EXTERNAL_KAKAO_ENABLED:-false}
      GOTRUE_EXTERNAL_KAKAO_CLIENT_ID: ${EXTERNAL_KAKAO_CLIENT_ID:-}
      GOTRUE_EXTERNAL_KAKAO_SECRET: ${EXTERNAL_KAKAO_SECRET:-}
      GOTRUE_EXTERNAL_KAKAO_REDIRECT_URI: ${EXTERNAL_KAKAO_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_KEYCLOAK_ENABLED: ${EXTERNAL_KEYCLOAK_ENABLED:-false}
      GOTRUE_EXTERNAL_KEYCLOAK_CLIENT_ID: ${EXTERNAL_KEYCLOAK_CLIENT_ID:-}
      GOTRUE_EXTERNAL_KEYCLOAK_SECRET: ${EXTERNAL_KEYCLOAK_SECRET:-}
      GOTRUE_EXTERNAL_KEYCLOAK_REDIRECT_URI: ${EXTERNAL_KEYCLOAK_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_LINKEDIN_ENABLED: ${EXTERNAL_LINKEDIN_ENABLED:-false}
      GOTRUE_EXTERNAL_LINKEDIN_CLIENT_ID: ${EXTERNAL_LINKEDIN_CLIENT_ID:-}
      GOTRUE_EXTERNAL_LINKEDIN_SECRET: ${EXTERNAL_LINKEDIN_SECRET:-}
      GOTRUE_EXTERNAL_LINKEDIN_REDIRECT_URI: ${EXTERNAL_LINKEDIN_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_NOTION_ENABLED: ${EXTERNAL_NOTION_ENABLED:-false}
      GOTRUE_EXTERNAL_NOTION_CLIENT_ID: ${EXTERNAL_NOTION_CLIENT_ID:-}
      GOTRUE_EXTERNAL_NOTION_SECRET: ${EXTERNAL_NOTION_SECRET:-}
      GOTRUE_EXTERNAL_NOTION_REDIRECT_URI: ${EXTERNAL_NOTION_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_TWITCH_ENABLED: ${EXTERNAL_TWITCH_ENABLED:-false}
      GOTRUE_EXTERNAL_TWITCH_CLIENT_ID: ${EXTERNAL_TWITCH_CLIENT_ID:-}
      GOTRUE_EXTERNAL_TWITCH_SECRET: ${EXTERNAL_TWITCH_SECRET:-}
      GOTRUE_EXTERNAL_TWITCH_REDIRECT_URI: ${EXTERNAL_TWITCH_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_TWITTER_ENABLED: ${EXTERNAL_TWITTER_ENABLED:-false}
      GOTRUE_EXTERNAL_TWITTER_CLIENT_ID: ${EXTERNAL_TWITTER_CLIENT_ID:-}
      GOTRUE_EXTERNAL_TWITTER_SECRET: ${EXTERNAL_TWITTER_SECRET:-}
      GOTRUE_EXTERNAL_TWITTER_REDIRECT_URI: ${EXTERNAL_TWITTER_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_SLACK_ENABLED: ${EXTERNAL_SLACK_ENABLED:-false}
      GOTRUE_EXTERNAL_SLACK_CLIENT_ID: ${EXTERNAL_SLACK_CLIENT_ID:-}
      GOTRUE_EXTERNAL_SLACK_SECRET: ${EXTERNAL_SLACK_SECRET:-}
      GOTRUE_EXTERNAL_SLACK_REDIRECT_URI: ${EXTERNAL_SLACK_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_SPOTIFY_ENABLED: ${EXTERNAL_SPOTIFY_ENABLED:-false}
      GOTRUE_EXTERNAL_SPOTIFY_CLIENT_ID: ${EXTERNAL_SPOTIFY_CLIENT_ID:-}
      GOTRUE_EXTERNAL_SPOTIFY_SECRET: ${EXTERNAL_SPOTIFY_SECRET:-}
      GOTRUE_EXTERNAL_SPOTIFY_REDIRECT_URI: ${EXTERNAL_SPOTIFY_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_WORKOS_ENABLED: ${EXTERNAL_WORKOS_ENABLED:-false}
      GOTRUE_EXTERNAL_WORKOS_CLIENT_ID: ${EXTERNAL_WORKOS_CLIENT_ID:-}
      GOTRUE_EXTERNAL_WORKOS_SECRET: ${EXTERNAL_WORKOS_SECRET:-}
      GOTRUE_EXTERNAL_WORKOS_REDIRECT_URI: ${EXTERNAL_WORKOS_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_ZOOM_ENABLED: ${EXTERNAL_ZOOM_ENABLED:-false}
      GOTRUE_EXTERNAL_ZOOM_CLIENT_ID: ${EXTERNAL_ZOOM_CLIENT_ID:-}
      GOTRUE_EXTERNAL_ZOOM_SECRET: ${EXTERNAL_ZOOM_SECRET:-}
      GOTRUE_EXTERNAL_ZOOM_REDIRECT_URI: ${EXTERNAL_ZOOM_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_AUTH0_ENABLED: ${EXTERNAL_AUTH0_ENABLED:-false}
      GOTRUE_EXTERNAL_AUTH0_CLIENT_ID: ${EXTERNAL_AUTH0_CLIENT_ID:-}
      GOTRUE_EXTERNAL_AUTH0_SECRET: ${EXTERNAL_AUTH0_SECRET:-}
      GOTRUE_EXTERNAL_AUTH0_REDIRECT_URI: ${EXTERNAL_AUTH0_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_AUTH0_URL: ${EXTERNAL_AUTH0_URL:-}
      GOTRUE_RATE_LIMIT_EMAIL_SENT: 100
      GOTRUE_RATE_LIMIT_SMS_SENT: 100
      GOTRUE_RATE_LIMIT_VERIFY: 30
      GOTRUE_RATE_LIMIT_TOKEN_REFRESH: 150
      GOTRUE_RATE_LIMIT_SIGNUP: 30
      GOTRUE_SECURITY_REFRESH_TOKEN_ROTATION_ENABLED: true
      GOTRUE_SECURITY_REFRESH_TOKEN_REUSE_INTERVAL: 10
      GOTRUE_SECURITY_CAPTCHA_ENABLED: ${ENABLE_CAPTCHA:-false}
      GOTRUE_SECURITY_CAPTCHA_PROVIDER: ${CAPTCHA_PROVIDER:-}
      GOTRUE_SECURITY_CAPTCHA_SECRET: ${CAPTCHA_SECRET:-}
      GOTRUE_SECURITY_CAPTCHA_TIMEOUT: 6000
      GOTRUE_MFA_CHALLENGE_MAX_AGE: 300
      GOTRUE_MFA_ENROLLED_MAX_AGE: 300
      GOTRUE_MFA_MAX_ENROLLED_FACTORS: 10
      GOTRUE_SAML_ENABLED: ${SAML_ENABLED:-false}
      GOTRUE_SAML_PRIVATE_KEY: ${SAML_PRIVATE_KEY:-}
      GOTRUE_SAML_CERT: ${SAML_CERT:-}
      GOTRUE_SAML_AUDIENCE: gotrue
      GOTRUE_LOG_LEVEL: info
    labels:
      - "coolify.managed=true"
      - "coolify.expose=false"
    depends_on:
      - db
      - analytics
    networks:
      - supabase-network

  # REST API (PostgREST)
  rest:
    image: postgrest/postgrest:v12.2.0
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public,storage,graphql_public}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: false
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY:-3600}
    labels:
      - "coolify.managed=true"
      - "coolify.expose=false"
    depends_on:
      - db
      - analytics
    networks:
      - supabase-network

  # Realtime
  realtime:
    image: supabase/realtime:v2.30.34
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: ""
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: true
      RUN_JANITOR: true
    labels:
      - "coolify.managed=true"
      - "coolify.expose=false"
    depends_on:
      - db
      - analytics
    networks:
      - supabase-network

  # Storage
  storage:
    image: supabase/storage-api:v1.10.1
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: s3
      GLOBAL_S3_BUCKET: ${STORAGE_S3_BUCKET:-supabase-storage}
      GLOBAL_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-}
      GLOBAL_S3_PROTOCOL: https
      GLOBAL_S3_FORCE_PATH_STYLE: "true"
      AWS_ACCESS_KEY_ID: ${STORAGE_S3_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${STORAGE_S3_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${STORAGE_S3_REGION:-us-east-1}
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: ${STORAGE_S3_REGION:-us-east-1}
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
    volumes:
      - storage-data:/var/lib/storage
    labels:
      - "coolify.managed=true"
      - "coolify.expose=false"
    depends_on:
      - db
      - rest
      - analytics
    networks:
      - supabase-network

  # Image Proxy
  imgproxy:
    image: darthsim/imgproxy:v3.8.0
    environment:
      IMGPROXY_BIND: :5001
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    volumes:
      - storage-data:/var/lib/storage
    labels:
      - "coolify.managed=true"
      - "coolify.expose=false"
    networks:
      - supabase-network

  # Meta
  meta:
    image: supabase/postgres-meta:v0.84.2
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    labels:
      - "coolify.managed=true"
      - "coolify.expose=false"
    depends_on:
      - db
      - analytics
    networks:
      - supabase-network

  # Edge Functions
  functions:
    image: supabase/edge-runtime:v1.56.0
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: postgresql://supabase_functions_admin:${POSTGRES_PASSWORD}@db:5432/postgres
    volumes:
      - ./volumes/functions:/home/deno/functions:Z
    labels:
      - "coolify.managed=true"
      - "coolify.expose=false"
    depends_on:
      - db
      - analytics
    networks:
      - supabase-network

  # Analytics (Logflare)
  analytics:
    image: supabase/logflare:1.4.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    environment:
      LOGFLARE_NODE_HOST: 127.0.0.1
      DB_USERNAME: supabase_admin
      DB_DATABASE: postgres
      DB_HOSTNAME: db
      DB_PORT: 5432
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SCHEMA: _analytics
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY}
      LOGFLARE_SINGLE_TENANT: "true"
      LOGFLARE_SUPABASE_MODE: "true"
      LOGFLARE_MIN_CLUSTER_SIZE: "1"
      POSTGRES_BACKEND_URL: postgresql://supabase_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      POSTGRES_BACKEND_SCHEMA: _analytics
      LOGFLARE_FEATURE_FLAG_OVERRIDE: multibackend=true
    labels:
      - "coolify.managed=true"
      - "coolify.expose=false"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - supabase-network

  # Database (PostgreSQL)
  db:
    image: supabase/postgres:15.1.1.78
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: 5432
      POSTGRES_PORT: 5432
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: postgres
      POSTGRES_DB: postgres
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY:-3600}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./volumes/db/init:/docker-entrypoint-initdb.d
    labels:
      - "coolify.managed=true"
      - "coolify.expose=false"
    networks:
      - supabase-network

networks:
  supabase-network:
    driver: bridge
    # Coolify v4 maneja la conexión a la red predefinida automáticamente

volumes:
  db-data:
    driver: local
  storage-data:
    driver: local
